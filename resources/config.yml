# Extra ms added to the lookback time (ping/2 + offset).
# Increase this if high-ping players still get inconsistent KB.
ping_offset: 25

# Horizontal KB strength (vanilla: 0.4)
horizontal_kb: 0.4

# Vertical KB when the player was on the ground client-side (vanilla: 0.4)
vertical_kb_ground: 0.4

# Vertical KB when the player was airborne client-side.
vertical_kb_air: 0.4

# How long to keep ground state history per player in ms.
# Set this higher than the worst ping you expect on your server.
buffer_duration_ms: 1000
